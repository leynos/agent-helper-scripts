# Shared en-GB-oxendict dictionary for the leynos code estate.
#
# Keep only generally valid Oxford forms and estate-wide terms here. Product
# names, quoted fixtures, and repository-specific identifiers belong in that
# repository's typos.local.toml overlay.

schema = 1

[oxford]
stems = [
  "amort",
  "anonym",
  "apolog",
  "author",
  "canonical",
  "capital",
  "categor",
  "central",
  "character",
  "civil",
  "colon",
  "container",
  "critic",
  "custom",
  "decentral",
  "denormal",
  "deserial",
  "destabil",
  "emphas",
  "energ",
  "equal",
  "factor",
  "familiar",
  "final",
  "formal",
  "general",
  "global",
  "harmon",
  "hypothes",
  "ideal",
  "initial",
  "internal",
  "international",
  "item",
  "jeopard",
  "legitim",
  "linear",
  "local",
  "material",
  "maxim",
  "mechan",
  "memor",
  "miniatur",
  "minim",
  "mobil",
  "modern",
  "modular",
  "monet",
  "neutral",
  "normal",
  "operational",
  "optim",
  "organ",
  "parameter",
  "parametr",
  "penal",
  "personal",
  "plural",
  "priorit",
  "public",
  "quant",
  "random",
  "rational",
  "real",
  "recogn",
  "regular",
  "reinitial",
  "reorgan",
  "sanit",
  "scrutin",
  "serial",
  "singular",
  "special",
  "stabil",
  "standard",
  "styl",
  "subsid",
  "summar",
  "symbol",
  "synchron",
  "synthes",
  "systemat",
  "theor",
  "token",
  "trivial",
  "unauthor",
  "uncategor",
  "uninitial",
  "unoptim",
  "unrecogn",
  "unsynchron",
  "util",
  "vector",
  "virtual",
  "visual",
]

[words]
accepted = [
  "oxendict",
  "yse",
]

[words.corrections]

[patterns]
ignore = [
  '`[^`\n]+`',
  '(?s)```.*?```',
]

[files]
exclude = [
  ".git",
  ".hypothesis",
  ".pytest_cache",
  ".tox",
  ".typos-oxendict-base.json",
  ".typos-oxendict-base.toml",
  ".uv-cache",
  ".uv-tools",
  ".venv",
  "Cargo.lock",
  "bun.lock",
  "data/typos-oxendict-base.toml",
  "dist",
  "node_modules",
  "package-lock.json",
  "pnpm-lock.yaml",
  "target",
  "uv.lock",
  "yarn.lock",
]
