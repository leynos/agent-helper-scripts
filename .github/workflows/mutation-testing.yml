name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-mutmut-workflow.md.
on:
  schedule:
    - cron: "50 12 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-mutmut.yml@3c1fa01bcf4c26dac79975c18b74c01d577dcf95
    with:
      # Mutable Python source lives in hooks/, not the src/ default.
      paths: "hooks/"
      # Flat layout: changed-file paths map to module globs unaltered.
      module-prefix-strip: ""
