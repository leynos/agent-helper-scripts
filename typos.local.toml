# Repository-specific identifiers and deliberate negative spelling fixtures.

schema = 1

[oxford]
stems = []

[words]
accepted = [
  "ANALYZER",
  "MOLD",
  "analyzer",
  "edn",
  "ises",
  "mold",
]

[words.corrections]
polymerisable = "polymerizable"
polymerisably = "polymerizably"
polymerisation = "polymerization"
polymerisations = "polymerizations"
polymerise = "polymerize"
polymerised = "polymerized"
polymeriser = "polymerizer"
polymerisers = "polymerizers"
polymerises = "polymerizes"
polymerising = "polymerizing"

[patterns]
ignore = [
  'RUST_ANALYZER(?:_PRECHECK)?',
  '\bMOLD\b',
  '\bmold\b',
  '\bartifact_name\b',
  '\bcolor:',
]

[files]
exclude = [
  "typos.local.toml",
]
